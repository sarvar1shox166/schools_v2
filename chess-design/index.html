/* daraja rangi */
function levelColor(l){
  if(!l) return "var(--text-dim)";
  if(l.includes("Nomzod")||l.includes("Grossmeyster")) return "var(--success)";
  if(l.includes("1-razryad")) return "var(--accent-text)";
  if(l.includes("2-razryad")) return "#6366f1";
  if(l.includes("3-razryad")||l.includes("4-razryad")) return "var(--warn)";
  return "#f43f5e"; /* Boshlang'ich */
}

function Students() {

  const [delId,setDelId]=useState(null);

  let rows=STUDENTS;
  if(filter==="qarzdor") rows=rows.filter(s=>s.pay==="qarzdor");
  else if(filter!=="hammasi") rows=rows.filter(s=>s.status===filter);
  if(q) rows=rows.filter(s=>
    s.name.toLowerCase().includes(q.toLowerCase())||
    s.username?.toLowerCase().includes(q.toLowerCase())||
    s.phone?.includes(q)
  );

    <PHead title={`O'quvchilar — ${STUDENTS.length} ta`}>
      <button className="btn sm"><Icon name="download" size={15}/> Eksport</button>
      <button className="btn sm primary"><Icon name="plus" size={15}/> Qo'shish</button>

    <Card className="fade-up">
      <div className="card-head" style={{flexWrap:"wrap",gap:10}}>
        <Seg val={filter} onChange={setFilter} opts={tabs}/>
        <div className="spacer"/>
        <label className="search" style={{minWidth:220}}>
          <Icon name="search" size={16}/>

      </div>

        <table className="tbl">
          <thead>

              <th>Ism Familya</th>
              <th>Username</th>
              <th>Parol</th>
              <th>Tel raqam</th>
              <th>Yoshi</th>
              <th>Darajasi</th>

          </thead>
          <tbody>

              <tr key={s.id}>

                <td>

                    <Av name={s.name} size={32} r={10}/>
                    <div>

                      <div className="cell-sub">{s.group} guruh</div>
                    </div>

                </td>

                {/* Username */}
                <td>
                  <span className="mono" style={{fontSize:13,fontWeight:600,color:"var(--text-dim)"}}>{s.username}</span>
                </td>

                {/* Parol */}
                <td>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span className="mono" style={{fontSize:13,fontWeight:600,color:"var(--text-dim)",letterSpacing: showPwd[s.id]?".02em":".12em"}}>
                      {showPwd[s.id] ? s.parol : "••••••••"}
                    </span>
                    <button className="iconbtn" style={{width:24,height:24}} onClick={()=>togglePwd(s.id)} title={showPwd[s.id]?"Yashirish":"Ko'rsatish"}>
                      <Icon name={showPwd[s.id]?"eye":"eye"} size={13}/>
                    </button>
                  </div>
                </td>

                {/* Tel */}
                <td>
                  <span className="mono" style={{fontSize:13}}>{s.phone}</span>
                </td>

                {/* Yosh */}
                <td>
                  <span style={{fontWeight:750,fontSize:14}}>{s.age}</span>

                {/* Daraja — rangli */}
                <td>
                  <span style={{fontWeight:700,fontSize:13,color:levelColor(s.level)}}>{s.level}</span>
                </td>

                <td>

                {/* Sana */}

                  <span className="mono cell-sub" style={{fontSize:12.5}}>{s.joined}</span>

                      onClick={()=>setDelId(s.id)} title="O'chirish">

                    </button>

    {/* Delete confirm modal */}

      </div>:null;})()}
    </Modal>}

/* ── MODAL ── */
function Modal({title,onClose,children}){
  return <div style={{position:"fixed",inset:0,zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
    <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.55)",backdropFilter:"blur(4px)"}}/>
    <div style={{position:"relative",background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"var(--r-xl)",padding:28,width:"100%",maxWidth:420,boxShadow:"0 24px 64px rgba(0,0,0,.35)",animation:"pageIn .25s var(--ease) both"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
        <div style={{fontWeight:800,fontSize:17}}>{title}</div>
        <button className="iconbtn" style={{width:30,height:30}} onClick={onClose}><Icon name="x" size={16}/></button>
      </div>
      {children}
    </div>
  </div>;
}
function ModalField({label,value,type="text"}){
  const [v,setV]=React.useState(value||"");
  return <div>
    <div style={{fontSize:12,fontWeight:700,color:"var(--text-faint)",marginBottom:6,textTransform:"uppercase",letterSpacing:".05em"}}>{label}</div>
    <input type={type} value={v} onChange={e=>setV(e.target.value)}
      style={{width:"100%",height:40,border:"1px solid var(--border-strong)",borderRadius:"var(--r-sm)",background:"var(--surface-2)",color:"var(--text)",padding:"0 13px",font:"inherit",fontSize:14,outline:"none",transition:"border-color .15s"}}
      onFocus={e=>e.target.style.borderColor="var(--accent)"}
      onBlur={e=>e.target.style.borderColor="var(--border-strong)"}/>
  </div>;
}

      {GROUPS.map(g=><Card key={g.id} className="fade-up">
        <div className="card-pad" style={{paddingBottom:14}}>
          <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
            <div style={{width:46,height:46,borderRadius:13,display:"grid",placeItems:"center",color:"#fff",flexShrink:0,background:g.color,fontWeight:800,fontSize:18}}>{g.id}</div>
            <div style={{flex:1,minWidth:0}}><div style={{fontWeight:750,fontSize:15}}>{g.name}</div><div style={{fontSize:12.5,color:"var(--text-faint)",marginTop:2}}>{g.level}</div></div>
            <button className="iconbtn" style={{width:32,height:32}}><Icon name="dotsV" size={16}/></button>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8,marginTop:15}}>
            {[["teacher",g.teacher],["calendar",`${g.days} · ${g.time}`],["pin",g.room]].map(([ic,v])=><div key={ic} style={{display:"flex",alignItems:"center",gap:9,fontSize:13,color:"var(--text-dim)"}}><Icon name={ic} size={14} style={{color:"var(--text-faint)"}}/> {v}</div>)}
          </div>
          <div style={{marginTop:14}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:6,fontSize:12.5}}>
              <span style={{color:"var(--text-dim)",fontWeight:600}}>To'ldirilganlik</span>
              <span className="tnum" style={{fontWeight:750}}>{g.count}/{g.cap}</span>
            </div>
            <div className="pbar"><span style={{width:`${(g.count/g.cap)*100}%`,background:g.color}}/></div>
          </div>
        </div>
      </Card>)}
    </div>:<Card className="fade-up">
      <table className="tbl"><thead><tr><th>Guruh</th><th>O'qituvchi</th><th>Kunlar/Vaqt</th><th>Xona</th><th>To'ldirish</th></tr></thead>
      <tbody>{GROUPS.map(g=><tr key={g.id}>
        <td><div className="with-av"><div style={{width:32,height:32,borderRadius:9,background:g.color,color:"#fff",display:"grid",placeItems:"center",fontWeight:800,fontSize:13,flexShrink:0}}>{g.id}</div><div><div className="cell-main">{g.name}</div><div className="cell-sub">{g.level}</div></div></div></td>
        <td style={{fontWeight:600}}>{g.teacher}</td><td className="cell-sub">{g.days}·{g.time}</td>
        <td><span className="badge neut">{g.room}</span></td>
        <td style={{minWidth:160}}><div style={{display:"flex",alignItems:"center",gap:10}}><div className="pbar" style={{flex:1}}><span style={{width:`${(g.count/g.cap)*100}%`,background:g.color}}/></div><span className="tnum cell-sub" style={{fontWeight:700}}>{g.count}/{g.cap}</span></div></td>
      </tr>)}</tbody></table>
    </Card>}
  </div>;
}

function Attendance() {
  const counts={p:0,a:0,l:0};
  ATTENDANCE.forEach(r=>r.marks.forEach(m=>{if(m in counts)counts[m]++;}));
  const total=counts.p+counts.a+counts.l;
  return <div className="content-inner page-enter">
    <PHead title="Davomat jurnali"><button className="btn sm primary"><Icon name="check" size={15}/> Davomat belgilash</button></PHead>
    <div className="grid cols-4" style={{marginBottom:"var(--gap)"}}>
      <StatCard icon="percent" tone="s" value={`${Math.round(counts.p/total*100)}%`} label="O'rtacha davomat" delta={<Delta dir="up">+3% o'tgan oy</Delta>}/>
      <StatCard icon="check" tone="a" value={counts.p} label="Kelganlar"/>
      <StatCard icon="clock" tone="w" value={counts.l} label="Kechikkanlar"/>
      <StatCard icon="x" tone="d" value={counts.a} label="Kelmaganlar"/>
    </div>
    <Card className="fade-up">
      <CardHead icon="attendance" title="Davomat jadvali" sub="Oxirgi 8 dars"/>
      <div style={{overflowX:"auto"}}>
        <table className="tbl"><thead><tr><th style={{minWidth:180}}>O'quvchi</th><th>Guruh</th>
          {ATT_DATES.map(d=><th key={d} style={{textAlign:"center"}}>{d}</th>)}<th style={{textAlign:"center"}}>%</th></tr></thead>
        <tbody>{ATTENDANCE.map((r,i)=>{
          const p=r.marks.filter(m=>m==="p").length,pct=Math.round(p/r.marks.length*100);
          return <tr key={i}>
            <td><div className="with-av"><Av name={r.name} size={30} r={9}/><span className="cell-main">{r.name}</span></div></td>
            <td><span className="badge neut">{r.group}</span></td>
            {r.marks.map((m,j)=><td key={j} style={{textAlign:"center"}}><span className={"att "+m} style={{margin:"0 auto"}}><Icon name={{p:"check",a:"x",l:"clock",n:"dots"}[m]} size={12}/></span></td>)}
            <td style={{textAlign:"center"}}><span className={"badge "+(pct>=80?"suc":pct>=60?"warn":"dang")}>{pct}%</span></td>
          </tr>;
        })}</tbody></table>
      </div>
    </Card>
  </div>;
}

function Payments() {
  const [tab,setTab]=useState("hammasi");
  const rows=tab==="hammasi"?PAYMENTS:PAYMENTS.filter(p=>p.status===tab);
  const paid=PAYMENTS.filter(p=>p.status==="to'langan").reduce((a,b)=>a+b.amount,0);
  const debt=PAYMENTS.filter(p=>p.status==="qarzdor").reduce((a,b)=>a+b.amount,0);
  return <div className="content-inner page-enter">
    <PHead title="To'lovlar"><button className="btn sm primary"><Icon name="plus" size={15}/> To'lov qabul</button></PHead>
    <div className="grid cols-4" style={{marginBottom:"var(--gap)"}}>
      <StatCard icon="wallet" tone="s" value={fmtSom(paid)} label="Qabul qilingan (so'm)" delta={<Delta dir="up">bu oy</Delta>}/>
      <StatCard icon="alert" tone="d" value={fmtSom(debt)} label="Qarzdorlik (so'm)" delta={<Delta dir="bad">3 ta o'quvchi</Delta>}/>
      <StatCard icon="check" tone="a" value="5" label="To'langan"/>
      <StatCard icon="clock" tone="w" value="3" label="Kutilayotgan"/>
    </div>
    <Card className="fade-up">
      <div className="card-head" style={{flexWrap:"wrap",gap:10}}>
        <Seg val={tab} onChange={setTab} opts={[{v:"hammasi",l:"Hammasi"},{v:"to'langan",l:"To'langan"},{v:"qarzdor",l:"Qarzdor"}]}/>
      </div>
      <div style={{overflowX:"auto"}}>
        <table className="tbl"><thead><tr><th>ID</th><th>O'quvchi</th><th>Guruh</th><th>Summa</th><th>Sana</th><th>Usul</th><th>Status</th></tr></thead>
        <tbody>{rows.map(p=><tr key={p.id}>
          <td className="mono cell-sub" style={{fontSize:12}}>{p.id}</td>
          <td><div className="with-av"><Av name={p.name} size={30} r={9}/><span className="cell-main">{p.name}</span></div></td>
          <td><span className="badge neut">{p.group}</span></td>
          <td className="tnum" style={{fontWeight:750}}>{fmtSom(p.amount)} so'm</td>
          <td className="mono cell-sub" style={{fontSize:12.5}}>{p.date}</td>
          <td><span className="badge info"><Icon name="payments" size={12}/> {p.method}</span></td>
          <td><SBadge s={p.status}/></td>
        </tr>)}</tbody></table>
      </div>
    </Card>
  </div>;
}

function Income() {
  const maxI=Math.max(...INCOME_M.map(m=>m.v));
  const tot=INCOME_S.reduce((a,b)=>a+b.v,0);
  let acc=0;
  const conic=INCOME_S.map(s=>{const st=(acc/tot*360).toFixed(1);acc+=s.v;return `${s.c} ${st}deg ${(acc/tot*360).toFixed(1)}deg`;}).join(", ");
  return <div className="content-inner page-enter">
    <PHead title="Daromadlar tahlili"><button className="btn sm"><Icon name="download" size={15}/> PDF</button></PHead>
    <div className="grid cols-4" style={{marginBottom:"var(--gap)"}}>
      <StatCard icon="income" tone="s" value="18.4M" label="Iyun daromadi" delta={<Delta dir="up">+8%</Delta>}/>
      <StatCard icon="trendingUp" tone="a" value="93.0M" label="Yil boshidan" delta={<Delta dir="up">+22%</Delta>}/>
      <StatCard icon="target" tone="i" value="92%" label="Reja bajarilishi"/>
      <StatCard icon="percent" tone="w" value="74K" label="O'rtacha / o'quvchi"/>
    </div>
    <div className="grid l-2-1">
      <Card>
        <CardHead icon="trendingUp" title="Oylik daromad" sub="Million so'mda" right={<span className="badge acc">+37.8%</span>}/>
        <div className="card-pad"><div className="bars">{INCOME_M.map((m,i)=><div className="bar-col" key={m.m}>
          <div className="bar" style={{height:`${(m.v/maxI)*100}%`,opacity:i===INCOME_M.length-1?1:0.76}}><span className="cap tnum" style={{fontSize:12}}>{m.v}M</span></div>
          <div className="bar-x">{m.m}</div>
        </div>)}</div></div>
      </Card>
      <Card>
        <CardHead icon="layers" title="Manbalar" sub="Iyun 2026"/>
        <div className="card-pad" style={{display:"flex",flexDirection:"column",gap:20}}>
          <div style={{position:"relative",width:150,height:150,margin:"0 auto"}}>
            <div style={{width:150,height:150,borderRadius:"50%",background:`conic-gradient(${conic})`}}/>
            <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:96,height:96,borderRadius:"50%",background:"var(--surface)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
              <div style={{fontWeight:800,fontSize:17}}>18.4M</div><div style={{fontSize:11,color:"var(--text-faint)"}}>jami</div>
            </div>
          </div>
          <div className="legend">{INCOME_S.map(s=><div className="row" key={s.nm}><span className="sw" style={{background:s.c}}/><span className="nm">{s.nm}</span><span className="vl">{s.v}M</span><span className="cell-sub">{Math.round(s.v/tot*100)}%</span></div>)}</div>
        </div>
      </Card>
    </div>
  </div>;
}

function Notifications() {
  return <div className="content-inner page-enter">
    <PHead title="Bildirishnomalar"><button className="btn sm"><Icon name="check" size={15}/> Barchasini o'qish</button></PHead>
    <div className="grid l-2-1">
      <Card className="fade-up">
        <CardHead icon="bell" title="So'nggi bildirishnomalar" right={<span className="badge dang">{NOTIFS.filter(n=>n.unread).length} yangi</span>}/>
        <div className="list">{NOTIFS.map(n=><div className="li" key={n.id} style={{alignItems:"flex-start",background:n.unread?"var(--accent-soft)":""}}>
          <div style={{width:40,height:40,borderRadius:12,display:"grid",placeItems:"center",flexShrink:0,background:"var(--surface-3)",color:"var(--accent-text)"}}><Icon name={n.icon} size={18}/></div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontWeight:700,fontSize:14}}>{n.title}</span>
              {n.unread&&<span className="sdot" style={{background:"var(--accent)"}}/>}
            </div>
            <div style={{fontSize:13,color:"var(--text-dim)",marginTop:3}}>{n.body}</div>
            <div style={{fontSize:12,color:"var(--text-faint)",marginTop:5}}>{n.when}</div>
          </div>
          <span className={"badge "+(n.type==="ogoh"?"dang":n.type==="tolov"?"suc":"acc")} style={{flexShrink:0,marginTop:2}}>{n.type}</span>
        </div>)}</div>
      </Card>
      <div style={{display:"flex",flexDirection:"column",gap:"var(--gap)"}}>
        <Card className="card-pad fade-up">
          <div style={{fontWeight:750,fontSize:15,marginBottom:16}}>Statistika</div>
          <div className="kpi-grid">
            {[{v:"12",l:"Bu hafta"},{v:"3",l:"O'qilmagan"},{v:"6",l:"Arizalar"},{v:"3",l:"To'lov ogoh."}].map(k=><div className="kpi" key={k.l}><div className="v">{k.v}</div><div className="l">{k.l}</div></div>)}
          </div>
        </Card>
        <Card className="card-pad fade-up">
          <div style={{fontWeight:750,fontSize:15,marginBottom:14}}>Sozlamalar</div>
          {[{l:"Yangi ariza",on:true},{l:"To'lov qabul",on:true},{l:"Qarzdorlik eslatma",on:true},{l:"Davomat xabari",on:false}].map(s=><div key={s.l} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 0",borderBottom:"1px solid var(--border)",fontSize:13.5}}>
            <span style={{color:"var(--text-dim)",fontWeight:600}}>{s.l}</span>
            <div style={{width:38,height:22,borderRadius:11,background:s.on?"var(--accent)":"var(--border-strong)",position:"relative",cursor:"pointer"}}>
              <div style={{position:"absolute",top:3,left:s.on?19:3,width:16,height:16,borderRadius:"50%",background:"#fff",transition:"left .2s"}}/>
            </div>
          </div>)}
        </Card>
      </div>
    </div>
  </div>;
}

function Reports() {
  return <div className="content-inner page-enter">
    <PHead title="Hisobotlar"><button className="btn sm primary"><Icon name="download" size={15}/> Hisobot yuklash</button></PHead>
    <div className="grid cols-4" style={{marginBottom:"var(--gap)"}}>
      <StatCard icon="reports" tone="a" value="18.4M" label="Iyun daromadi" delta={<Delta dir="up">+8%</Delta>}/>
      <StatCard icon="students" tone="i" value="248" label="Jami o'quvchilar" delta={<Delta dir="up">+12</Delta>}/>
      <StatCard icon="attendance" tone="s" value="87%" label="O'rtacha davomat"/>
      <StatCard icon="award" tone="w" value="3" label="Turnir g'oliblari"/>
    </div>
    <div className="grid cols-2" style={{marginBottom:"var(--gap)"}}>
      {[
        {icon:"income",title:"Moliyaviy hisobot",desc:"Daromad, xarajat, qarzdorlik",b:"Tayyor",bc:"suc"},
        {icon:"students",title:"O'quvchilar hisoboti",desc:"Qabul, chiqish, faollik",b:"Tayyor",bc:"suc"},
        {icon:"attendance",title:"Davomat hisoboti",desc:"Guruh va individual",b:"Tayyor",bc:"suc"},
        {icon:"trendingUp",title:"O'sish tahlili",desc:"Oylik / yillik dinamika",b:"Yangi",bc:"acc"},
      ].map(r=><Card key={r.title} className="fade-up">
        <div className="card-pad" style={{display:"flex",alignItems:"center",gap:16}}>
          <div className="head-ic" style={{width:46,height:46,borderRadius:13}}><Icon name={r.icon} size={22}/></div>
          <div style={{flex:1}}><div style={{fontWeight:750,fontSize:15}}>{r.title}</div><div style={{fontSize:12.5,color:"var(--text-faint)",marginTop:3}}>{r.desc}</div></div>
          <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:10}}>
            <span className={"badge "+r.bc}>{r.b}</span>
            <button className="btn sm"><Icon name="download" size={14}/> Yuklab olish</button>
          </div>
        </div>
      </Card>)}
    </div>

/* ─────────────────────── APP ─────────────────────── */
const PAGE_META={
  dashboard:{title:"Dashboard",sub:"Umumiy ko'rinish"},schedule:{title:"Dars vaqtlari",sub:"Haftalik jadval"},
  teachers:{title:"O'qituvchilar",sub:"Barcha murabbiylar"},students:{title:"O'quvchilar",sub:"Ro'yxat va boshqaruv"},
  groups:{title:"Guruhlar",sub:"Faol guruhlar"},attendance:{title:"Davomat",sub:"Yo'qlanish jurnali"},
  payments:{title:"To'lovlar",sub:"Moliyaviy operatsiyalar"},income:{title:"Daromadlar",sub:"Tahlil va hisobot"},
  notifications:{title:"Bildirishnomalar",sub:"Xabarnomalar"},reports:{title:"Hisobotlar",sub:"Tahliliy hisobotlar"},
};
const PAGES={dashboard:Dashboard,schedule:Schedule,teachers:Teachers,students:Students,groups:Groups,attendance:Attendance,payments:Payments,income:Income,notifications:Notifications,reports:Reports};
const TD={accent:localStorage.getItem("chess_accent")||"blue",density:localStorage.getItem("chess_density")||"normal",theme:localStorage.getItem("chess_theme")||"light"};

function App() {
  const [page,setPage]=useState(()=>localStorage.getItem("chess_page")||"dashboard");
  const [collapsed,setCollapsed]=useState(false);
  const [tweaks,setTweak]=window.useTweaks(TD);
  const accent=tweaks.accent||"blue",density=tweaks.density||"normal",theme=tweaks.theme||"light";
  useEffect(()=>{
    const h=document.documentElement;
    h.setAttribute("data-theme",theme);h.setAttribute("data-accent",accent);h.setAttribute("data-density",density);
    localStorage.setItem("chess_accent",accent);localStorage.setItem("chess_density",density);localStorage.setItem("chess_theme",theme);
  },[theme,accent,density]);
  useEffect(()=>{localStorage.setItem("chess_page",page);},[page]);
  const meta=PAGE_META[page]||{title:page,sub:""};
  const PageComp=PAGES[page];
  return <>
    <div className={"app"+(collapsed?" collapsed":"")}>
      <Sidebar page={page} setPage={setPage} collapsed={collapsed} setCollapsed={setCollapsed}/>
      <main className="main">
        <Topbar title={meta.title} sub={meta.sub} theme={theme} setTheme={v=>setTweak("theme",v)} collapsed={collapsed} setCollapsed={setCollapsed}/>
        <div className="content">
          {PageComp?<PageComp key={page} go={setPage}/>:<div className="content-inner" style={{padding:40,color:"var(--text-faint)"}}>Sahifa topilmadi</div>}
        </div>
      </main>
    </div>
    <window.TweaksPanel title="Tweaks">
      <window.TweakSection label="Rang"/><window.TweakRadio label="Palitra" value={accent} options={["blue","emerald","indigo","amber","violet"]} onChange={v=>setTweak("accent",v)}/>
      <window.TweakSection label="Ko'rinish"/><window.TweakRadio label="Mavzu" value={theme} options={["light","dark"]} onChange={v=>setTweak("theme",v)}/>
      <window.TweakRadio label="Zichlik" value={density} options={["normal","compact"]} onChange={v=>setTweak("density",v)}/>
    </window.TweaksPanel>
  </>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
