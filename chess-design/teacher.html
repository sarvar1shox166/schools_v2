    /* Teacher-panel overrides */
    .t-hero {

    }

      font-size: 180px; line-height: 1; opacity: .07; color: #fff;
      pointer-events: none;

    .t-hero h2 { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
    .t-hero p  { opacity: .82; font-size: 14px; margin: 0; }
    .hero-stats {
      display: flex; gap: 28px; margin-top: 22px; flex-wrap: wrap;
    }
    .hero-stat { text-align: center; }
    .hero-stat .v { font-size: 26px; font-weight: 800; line-height: 1; }
    .hero-stat .l { font-size: 12px; opacity: .78; margin-top: 4px; }
    .hero-sep { width: 1px; background: rgba(255,255,255,.25); align-self: stretch; }

    /* lesson card */
    .lesson-card {
      border-radius: var(--r-md); padding: 14px 16px;
      border: 1px solid var(--border); background: var(--surface-2);
      border-left: 3.5px solid var(--accent); transition: background .15s;
      cursor: pointer;
    }
    .lesson-card:hover { background: var(--hover); }
    .lesson-card.active { background: var(--accent-soft); border-color: var(--accent); }
    .lesson-card .lc-time { font-size: 12.5px; color: var(--text-faint); font-weight: 700; font-variant-numeric: tabular-nums; }
    .lesson-card .lc-name { font-weight: 750; font-size: 15px; margin-top: 4px; }
    .lesson-card .lc-meta { font-size: 12.5px; color: var(--text-dim); margin-top: 5px; display: flex; gap: 12px; align-items: center; }

    /* student progress row */
    .sp-row { display: flex; align-items: center; gap: 14px; padding: 11px 0; }
    .sp-row + .sp-row { border-top: 1px solid var(--border); }
    .sp-name { flex: 1; min-width: 0; }
    .sp-name .nm { font-weight: 650; font-size: 14px; }
    .sp-name .sub { font-size: 12px; color: var(--text-faint); margin-top: 2px; }
    .sp-bar { width: 110px; }
    .sp-pct { font-weight: 750; font-size: 13.5px; min-width: 38px; text-align: right; font-variant-numeric: tabular-nums; }

    /* rating stars */
    .stars { display: flex; gap: 3px; color: var(--warn); }
    .stars .ic.empty { color: var(--border-strong); }

    /* quick att grid */
    .att-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; }
    .att-row + .att-row { border-top: 1px solid var(--border); }
    .att-btns { display: flex; gap: 6px; margin-left: auto; flex-shrink: 0; }
    .att-btn {
      width: 30px; height: 30px; border-radius: 9px; border: 1px solid var(--border);
      background: var(--surface-2); color: var(--text-faint); display: grid; place-items: center;
      font-size: 12px; font-weight: 700; cursor: pointer; transition: all .15s;
    }
    .att-btn.p.sel { background: color-mix(in oklab, var(--success) 18%, var(--surface)); color: var(--success); border-color: var(--success); }
    .att-btn.l.sel { background: color-mix(in oklab, var(--warn) 22%, var(--surface)); color: color-mix(in oklab, var(--warn) 70%, var(--text)); border-color: var(--warn); }
    .att-btn.a.sel { background: color-mix(in oklab, var(--danger) 15%, var(--surface)); color: var(--danger); border-color: var(--danger); }

    /* nav active dot */
    .t-nav-item.active { background: var(--accent-soft); color: var(--accent-text); }
    .t-nav-item.active::before {
      content: ""; position: absolute; left: -14px; top: 50%; transform: translateY(-50%);
      width: 3.5px; height: 20px; border-radius: 0 4px 4px 0; background: var(--accent);
    }

    /* message bubble */
    .msg { padding: 11px 14px; border-radius: var(--r-md); max-width: 78%; font-size: 13.5px; line-height: 1.5; }
    .msg.out { background: var(--accent); color: #fff; margin-left: auto; border-bottom-right-radius: 4px; }
    .msg.in  { background: var(--surface-3); border-bottom-left-radius: 4px; }
    .msg-row { display: flex; gap: 9px; align-items: flex-end; margin-bottom: 10px; }
    .msg-row.out { flex-direction: row-reverse; }
    .msg-time { font-size: 11px; color: var(--text-faint); white-space: nowrap; }

      background: linear-gradient(135deg, #3F8CFF, #6aa8ff);
    }

  </style>
</head>

/* ── tiny design primitives ── */
function Av({ name, size = 38, radius = 11 }) {
  const AV_COLORS = [
    "linear-gradient(140deg,#3F8CFF,#6aa8ff)",
    "linear-gradient(140deg,#0ea5a4,#14b8a6)",
    "linear-gradient(140deg,#f59e0b,#f97316)",
    "linear-gradient(140deg,#ec4899,#f43f5e)",
    "linear-gradient(140deg,#10b981,#84cc16)",
    "linear-gradient(140deg,#8b5cf6,#d946ef)",
  ];
  function avColor(s) { let h=0; for(let i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))|0; return AV_COLORS[Math.abs(h)%AV_COLORS.length]; }
  function ini(n) { const p=n.trim().split(/\s+/); return ((p[0]?.[0]||"")+(p[1]?.[0]||"")).toUpperCase(); }
  return (
    <div style={{ width: size, height: size, borderRadius: radius, background: avColor(name),
      display: "grid", placeItems: "center", color: "#fff",
      fontWeight: 700, fontSize: size * 0.35, flexShrink: 0, fontFamily: "inherit" }}>
      {ini(name)}
    </div>
  );
}

function Ic({ n, size = 19, sw = 1.75, style, className = "" }) {
  return <Icon name={n} size={size} sw={sw} style={style} className={className} />;
}

function Badge({ cls, icon, children }) {
  return <span className={"badge " + cls} style={{ display:"inline-flex", alignItems:"center", gap:5 }}>
    {icon && <Ic n={icon} size={12} />}{children}

}

/* QUICK ATT component */
function QuickAtt({ students }) {
  const [marks, setMarks] = useState(() => Object.fromEntries(students.map(s => [s.id, "p"])));
  const toggle = (id, v) => setMarks(m => ({ ...m, [id]: m[id]===v ? null : v }));
  return (
    <div>
      {students.map(s => (
        <div className="att-row" key={s.id}>
          <Av name={s.name} size={30} radius={9} />
          <div style={{ flex:1, fontSize:13.5, fontWeight:650 }}>{s.name}</div>
          <div className="att-btns">
            {[["p","✓"],["l","~"],["a","✗"]].map(([k,sym]) => (
              <button key={k} className={"att-btn "+k+(marks[s.id]===k?" sel":"")}
                onClick={() => toggle(s.id, k)} title={{ p:"Keldi", l:"Kechikdi", a:"Kelmadi" }[k]}>
                {sym}
              </button>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

            ))}
          </div>
        </div>
      </div>

/* ── PUZZLES ── */
const WP_P={K:'♔',Q:'♕',R:'♖',B:'♗',N:'♘',P:'♙'};
const BP_P={K:'♚',Q:'♛',R:'♜',B:'♝',N:'♞',P:'♟'};
const PZ_DIFF_LBL=['','Oson',"O'rta",'Qiyin','Murakkab','Ekspert'];
const PZ_DIFF_CLR=['','var(--success)','var(--accent-text)','var(--warn)','var(--danger)','#8b5cf6'];
const PZ_FILES='abcdefgh';

function loadTchPz(){try{return JSON.parse(localStorage.getItem('sq_teacher_puzzles')||'[]');}catch(e){return[];}}
function loadPzSt(){try{return JSON.parse(localStorage.getItem('sq_puzzle_stats')||'{}');}catch(e){return{};}}
function emptyBrd(){return Array(8).fill(null).map(()=>Array(8).fill(null));}
function startBrd(){
  const b=emptyBrd();
  b[0]=[{c:'b',t:'R'},{c:'b',t:'N'},{c:'b',t:'B'},{c:'b',t:'Q'},{c:'b',t:'K'},{c:'b',t:'B'},{c:'b',t:'N'},{c:'b',t:'R'}];
  b[1]=Array(8).fill(null).map(()=>({c:'b',t:'P'}));
  b[6]=Array(8).fill(null).map(()=>({c:'w',t:'P'}));
  b[7]=[{c:'w',t:'R'},{c:'w',t:'N'},{c:'w',t:'B'},{c:'w',t:'Q'},{c:'w',t:'K'},{c:'w',t:'B'},{c:'w',t:'N'},{c:'w',t:'R'}];
  return b;
}
const PPALETTE=[{c:'w',t:'K'},{c:'w',t:'Q'},{c:'w',t:'R'},{c:'w',t:'B'},{c:'w',t:'N'},{c:'w',t:'P'},{c:'b',t:'K'},{c:'b',t:'Q'},{c:'b',t:'R'},{c:'b',t:'B'},{c:'b',t:'N'},{c:'b',t:'P'}];

function BoardEditor({board,setBoard,ansFrom,setAnsFrom,ansTo,setAnsTo}){
  const [sel,setSel]=useState({c:'w',t:'Q'});
  const [mode,setMode]=useState('place');
  const click=(r,c)=>{
    if(mode==='from'){setAnsFrom([r,c]);setMode('to');}
    else if(mode==='to'){setAnsTo([r,c]);setMode('place');}
    else{const nb=board.map(row=>[...row]);if(nb[r][c]&&nb[r][c].c===sel.c&&nb[r][c].t===sel.t)nb[r][c]=null;else nb[r][c]={c:sel.c,t:sel.t};setBoard(nb);}
  };
  const mCls={place:'var(--surface-2)',from:'#f59e0b',to:'#22c55e'};
  return(
    <div>
      <div style={{display:'flex',gap:6,marginBottom:10,flexWrap:'wrap',alignItems:'center'}}>
        {[['place','Figur qo\'yish'],['from','Javob: dan ▶'],['to','Javob: gacha ◼']].map(([m,l])=>(
          <button key={m} onClick={()=>setMode(m)}
            style={{height:30,padding:'0 11px',borderRadius:8,border:'none',fontFamily:'inherit',fontSize:12,fontWeight:700,cursor:'pointer',
              background:mode===m?mCls[m]:'var(--surface-2)',color:mode===m&&m!=='place'?'#fff':'var(--text)',transition:'all .15s'}}>
            {l}
          </button>
        ))}
        {ansFrom&&ansTo&&<span style={{fontSize:12,fontWeight:700,color:'var(--success)',marginLeft:4}}>✓ {PZ_FILES[ansFrom[1]]}{8-ansFrom[0]}→{PZ_FILES[ansTo[1]]}{8-ansTo[0]}</span>}
      </div>
      {mode==='place'&&(
        <div style={{display:'flex',gap:5,marginBottom:10,flexWrap:'wrap',alignItems:'center'}}>
          <span style={{fontSize:11,color:'var(--text-faint)',fontWeight:600,marginRight:2}}>Figur:</span>
          {PPALETTE.map(({c,t})=>{const ch=c==='w'?WP_P[t]:BP_P[t];const is=sel.c===c&&sel.t===t;return(
            <button key={c+t} onClick={()=>setSel({c,t})}
              style={{width:32,height:32,border:is?'2px solid var(--accent)':'1px solid var(--border)',borderRadius:8,
                background:is?'var(--accent-soft)':'var(--surface-2)',fontSize:19,cursor:'pointer',display:'grid',placeItems:'center',transition:'all .12s'}}>{ch}</button>
          );})}
          <button className="btn sm" onClick={()=>setBoard(emptyBrd())} style={{height:32,marginLeft:4}}>Tozalash</button>
          <button className="btn sm" onClick={()=>setBoard(startBrd())} style={{height:32}}>Boshlang'ich</button>
        </div>
      )}
      <div style={{display:'inline-block',border:'3px solid #5a3e1b',borderRadius:6,overflow:'hidden',cursor:mode!=='place'?'crosshair':'default'}}>
        {board.map((row,r)=>(
          <div key={r} style={{display:'flex'}}>
            {row.map((cell,c)=>{
              const lgt=(r+c)%2===0;
              const isF=ansFrom&&ansFrom[0]===r&&ansFrom[1]===c;
              const isT=ansTo&&ansTo[0]===r&&ansTo[1]===c;
              const bg=isF?'#f6f669':isT?'#7fc97f':lgt?'#f0d9b5':'#b58863';
              return(
                <div key={c} onClick={()=>click(r,c)}
                  style={{width:44,height:44,background:bg,display:'flex',alignItems:'center',justifyContent:'center',
                    fontSize:28,lineHeight:1,position:'relative',userSelect:'none',
                    filter:cell?'drop-shadow(0 1px 2px rgba(0,0,0,.5))':'none'}}>
                  {cell?(cell.c==='w'?WP_P[cell.t]:BP_P[cell.t]):null}
                  {r===7&&<span style={{position:'absolute',bottom:1,right:2,fontSize:8,fontWeight:700,color:lgt?'#b58863':'#f0d9b5',opacity:.8}}>{PZ_FILES[c]}</span>}
                  {c===0&&<span style={{position:'absolute',top:1,left:2,fontSize:8,fontWeight:700,color:lgt?'#b58863':'#f0d9b5',opacity:.8}}>{8-r}</span>}
                </div>
              );
            })}
          </div>
        ))}
      </div>
    </div>
  );
}

            {icon:'eye',   tone:'d',v:`${dispStats.reduce((a,s)=>a+s.total,0)} ta`,l:'Jami yechimlar'},

              </div>
              <div className="pbar"><span style={{width:`${Math.round(selStu.correct/(selStu.total||1)*100)}%`}}/></div>
            </div>
          </div>
        )}
      </>}

      {delId&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',zIndex:9000,display:'flex',alignItems:'center',justifyContent:'center',backdropFilter:'blur(4px)'}}>
          <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:18,padding:28,maxWidth:320,width:'90%',textAlign:'center'}}>
            <div style={{fontSize:38,marginBottom:12}}>🗑️</div>
            <div style={{fontWeight:800,fontSize:16,marginBottom:8}}>Masalani o'chirasizmi?</div>
            <div style={{color:'var(--text-faint)',fontSize:13,marginBottom:22}}>Bu amalni ortga qaytarib bo'lmaydi</div>
            <div style={{display:'flex',gap:10}}>
              <button className="btn sm" style={{flex:1,justifyContent:'center',height:40}} onClick={()=>setDelId(null)}>Bekor</button>
              <button className="btn sm" style={{flex:1,justifyContent:'center',height:40,background:'var(--danger)',color:'#fff',border:'none'}}
                onClick={()=>{savePz(puzzles.filter(p=>p.id!==delId));setDelId(null);}}>O'chirish</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── APP ── */
const TWEAK_DEFS = {
  accent:  localStorage.getItem("tchess_accent")  || "blue",
  density: localStorage.getItem("tchess_density") || "normal",
  theme:   localStorage.getItem("tchess_theme")   || "light",
};

function App() {
  const [page, setPage]           = useState(() => localStorage.getItem("tchess_page") || "dashboard");
  const [collapsed, setCollapsed] = useState(false);
  const [tweaks, setTweak]        = window.useTweaks(TWEAK_DEFS);

  const accent  = tweaks.accent  || "blue";
  const density = tweaks.density || "normal";
  const theme   = tweaks.theme   || "light";

  useEffect(() => {
    const h = document.documentElement;
    h.setAttribute("data-theme",   theme);
    h.setAttribute("data-accent",  accent);
    h.setAttribute("data-density", density);
    localStorage.setItem("tchess_accent",  accent);
    localStorage.setItem("tchess_density", density);
    localStorage.setItem("tchess_theme",   theme);
  }, [theme, accent, density]);

  useEffect(() => { localStorage.setItem("tchess_page", page); }, [page]);

  const meta = T_PAGE_META[page] || { title: page, sub: "" };
  const PageMap = { dashboard:TDashboard, schedule:TSchedule, students:TStudents, attendance:TAttendance,
    progress:TProgress, materials:TMaterials, messages:TMessages, notifications:TNotifications, profile:TProfile, puzzles:TPuzzles };
  const PageComp = PageMap[page];

  return (
    <>
      <div className={"app" + (collapsed ? " collapsed" : "")}>
        <TSidebar page={page} setPage={setPage} collapsed={collapsed} setCollapsed={setCollapsed} />
        <main className="main">
          <TTopbar title={meta.title} sub={meta.sub} theme={theme}
            setTheme={v => setTweak("theme", v)} collapsed={collapsed} setCollapsed={setCollapsed} />
          <div className="content">
            {PageComp
              ? <PageComp key={page} go={setPage} />
              : <div className="content-inner"><p style={{ color:"var(--text-faint)", padding:40 }}>Sahifa topilmadi</p></div>}
          </div>
        </main>
      </div>

      <window.TweaksPanel title="Tweaks">
        <window.TweakSection label="Rang palitra" />
        <window.TweakRadio label="Rang" value={accent}
          options={["blue","emerald","indigo","amber","violet"]}
          onChange={v => setTweak("accent", v)} />
        <window.TweakSection label="Ko'rinish" />
        <window.TweakRadio label="Mavzu" value={theme}
          options={["light","dark"]} onChange={v => setTweak("theme", v)} />
        <window.TweakRadio label="Zichlik" value={density}
          options={["normal","compact"]} onChange={v => setTweak("density", v)} />
      </window.TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
